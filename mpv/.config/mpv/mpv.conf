# Hardware decoding (safe for NVIDIA/AMD/Intel)
hwdec=auto-copy

fs=yes

# High-quality GPU rendering (modern default)
vo=gpu-next
gpu-api=vulkan  # Or auto/openGL for broader compat

# Video quality profile (sharp scaling, HDR)
profile=high-quality
scale=ewa_lanczos  # Best for downscaling 4K->1080p

# Smooth motion/interpolation (disable if choppy)
interpolation=yes
video-sync=display-resample

# QoL: Resume playback, keep window open
save-position-on-quit=yes
keep-open=yes
autofit-larger=85%x85%  # Window resize

# Tell yt-dlp to write standard and auto-generated subtitles for English
ytdl-raw-options=sub-lang="en,eng,enUS,en-US",write-sub=,write-auto-sub=

# Tell mpv which subtitle languages to prefer and to load them automatically
slang=en,eng,enUS,en-US
sub-auto=fuzzy
